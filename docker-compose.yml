services:
  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "5001:5001"
    networks:
      - micro-net

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "5002:5002"
    networks:
      - micro-net

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "5000:5000"
    depends_on:
      - product-service
      - order-service
    environment:
      PRODUCT_SERVICE_URL: http://product-service:5001
      ORDER_SERVICE_URL: http://order-service:5002
    networks:
      - micro-net

networks:
  micro-net:
    driver: bridge
